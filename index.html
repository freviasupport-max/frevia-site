<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FREVIA – Remake / Handmade / IT</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: "Noto Sans JP", sans-serif;
    letter-spacing: 0.03em;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.15em;
  }

  main {
    padding-top: 120px;
  }

  section {
    padding: 140px 10vw;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  h2 {
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-size: 26px;
    margin-bottom: 20px;
  }

  .sub {
    color: #aaa;
    max-width: 600px;
    line-height: 1.8;
    margin-bottom: 40px;
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }

  .card {
    padding: 40px 30px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    transition: 0.3s ease;
  }

  .card:hover {
    border-color: #d9a441;
    transform: translateY(-4px);
  }

  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 6px;
    margin-bottom: 20px;
    opacity: 0.9;
    transition: 0.3s ease;
  }

  .card:hover img {
    opacity: 1;
  }

  footer {
    padding: 40px;
    text-align: center;
    color: #777;
    font-size: 14px;
  }

  .fade-up {
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.9s ease;
  }

  .fade-up.show {
    opacity: 1;
    transform: translateY(0);
  }

  .delay-1 { transition-delay: 0.1s; }
  .delay-2 { transition-delay: 0.2s; }
  .delay-3 { transition-delay: 0.3s; }

  /* ===== ABOUT セクション（3D粒子＋光ライン＋強い発光） ===== */
  .about-section {
    position: relative;
    width: 100%;
    height: 420px;
    overflow: hidden;
    background: #000;
    padding: 0 !important;
    border-bottom: none !important;
  }

  #particle3d {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  /* 光ライン：ずっと滑らかに流れる */
  .light-line {
    position: absolute;
    top: 50%;
    left: -40%;
    width: 40%;
    height: 4px;
    background: linear-gradient(90deg,
      rgba(212,175,55,0) 0%,
      rgba(212,175,55,1) 50%,
      rgba(212,175,55,0) 100%
    );
    filter: blur(6px);
    animation: lineSweep 4s linear infinite;
  }

  @keyframes lineSweep {
    0%   { left: -40%; opacity: 1; }
    100% { left: 110%; opacity: 1; }
  }

  /* 文字の発光をかなり強めに */
  .about-content {
    position: relative;
    z-index: 10;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
  }

  .title {
    font-size: 48px;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }

  .glow-text {
    animation: glow 4s ease-in-out infinite;
  }

  @keyframes glow {
    0% {
      filter: brightness(1);
      text-shadow:
        0 0 8px rgba(212,175,55,0.4),
        0 0 16px rgba(212,175,55,0.2);
    }
    40% {
      filter: brightness(1.4);
      text-shadow:
        0 0 12px rgba(212,175,55,0.7),
        0 0 28px rgba(212,175,55,0.4);
    }
    70% {
      filter: brightness(2);
      text-shadow:
        0 0 18px rgba(212,175,55,0.9),
        0 0 40px rgba(212,175,55,0.7);
    }
    100% {
      filter: brightness(1.2);
      text-shadow:
        0 0 10px rgba(212,175,55,0.5),
        0 0 20px rgba(212,175,55,0.3);
    }
  }

  .frevia { color: #fff; }
  .studio { color: #d4af37; }

  .desc {
    font-size: 16px;
    line-height: 1.8;
    opacity: 0.9;
  }
</style>
</head>

<body>

<header>
  <div class="logo">FREVIA</div>
</header>

<main>

<!-- ===== ABOUT（3D粒子＋光ライン＋強発光） ===== -->
<section class="about-section fade-up">
  <canvas id="particle3d"></canvas>
  <div class="light-line"></div>

  <div class="about-content glow-text">
    <h1 class="title">
      <span class="frevia">FREVIA</span>
      <span class="studio">STUDIO</span>
    </h1>
    <p class="desc">
      自由と創造をかたちにする、リメイク × ハンドメイド × IT の複合スタジオ。<br>
      シンプルで、強く、美しいものづくりを追求します。
    </p>
  </div>
</section>

<section class="fade-up">
  <h2>ABOUT</h2>
  <p class="sub">
    FREVIAは、リメイク・ハンドメイド制作  
    ITシステム開発を組み合わせたハイブリッドスタジオです。
  </p>
</section>

<section class="fade-up">
  <h2>SERVICES</h2>
  <div class="services-grid">

    <div class="card fade-up delay-1">
      <img src="/frevia-site/images/remake.jpg" alt="Remake">
      <h3>REMAKE</h3>
      <p class="sub">服のリメイク</p>
    </div>

    <div class="card fade-up delay-2">
      <img src="/frevia-site/images/handmade.jpg" alt="Handmade">
      <h3>HANDMADE</h3>
      <p class="sub">アクセサリー・時計などの一点物の制作</p>
    </div>

    <div class="card fade-up delay-3">
      <img src="/frevia-site/images/it-flow.jpg" alt="IT Solutions">
      <h3>IT SOLUTIONS</h3>
      <p class="sub">GAS / API / 自動化ツール開発。</p>
    </div>

  </div>
</section>

<section class="fade-up">
  <h2>CONTACT</h2>
  <p class="sub">ご相談・制作依頼などお気軽にお問い合わせください。</p>
</section>

</main>

<footer>
  © FREVIA STUDIO
</footer>

<script>
/* fade-up */
const targets = document.querySelectorAll('.fade-up');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('show');
  });
}, { threshold: 0.2 });
targets.forEach(target => observer.observe(target));

/* 3D粒子：奥から手前へ“ずっと”流れ続ける */
const canvas = document.getElementById("particle3d");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
window.addEventListener("resize", resize);
resize();

const COUNT = 320;
let particles = [];

function init() {
  particles = [];
  for (let i = 0; i < COUNT; i++) {
    particles.push({
      x: (Math.random() - 0.5) * 800,
      y: (Math.random() - 0.5) * 800,
      z: Math.random() * 2000 + 200,
      size: 1 + Math.random() * 2,
      speed: 6 + Math.random() * 4
    });
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  particles.forEach(p => {
    p.z -= p.speed;

    // 手前まで来たら奥に戻す（止まらず流れ続ける）
    if (p.z < 50) {
      p.z = 2000;
      p.x = (Math.random() - 0.5) * 800;
      p.y = (Math.random() - 0.5) * 800;
    }

    const scale = 200 / p.z;
    const x2d = cx + p.x * scale;
    const y2d = cy + p.y * scale;

    ctx.fillStyle = "rgba(212,175,55," + (0.2 + (1 - p.z / 2000) * 0.8) + ")";
    ctx.beginPath();
    ctx.arc(x2d, y2d, p.size * scale, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

init();
animate();
</script>

</body>
</html>
