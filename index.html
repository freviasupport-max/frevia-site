<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FREVIA – Remake / Handmade / IT</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: "Noto Sans JP", sans-serif;
    letter-spacing: 0.03em;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.15em;
  }

  main {
    padding-top: 120px;
  }

  section {
    padding: 140px 10vw;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  h1, h2 {
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  h1 {
    font-size: 42px;
    margin-bottom: 20px;
  }

  h2 {
    font-size: 26px;
    margin-bottom: 20px;
  }

  .sub {
    color: #aaa;
    max-width: 600px;
    line-height: 1.8;
    margin-bottom: 40px;
  }

  /* ▼▼▼ ABOUT セクション（光アニメーション） ▼▼▼ */
  .about-section {
    position: relative;
    width: 100%;
    height: 420px;
    overflow: hidden;
    background: #000;
    padding: 0 !important;
    border-bottom: none !important;
  }

  /* 奥から飛んでくる光の玉 */
  .light-orb {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 20px;
    height: 20px;
    background: radial-gradient(circle,
      rgba(212,175,55,1) 0%,
      rgba(212,175,55,0.3) 60%,
      rgba(212,175,55,0) 100%
    );
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0.1);
    filter: blur(4px);
    animation: orbFly 4s ease-out infinite;
  }

  @keyframes orbFly {
    0%   { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
    20%  { opacity: 1; }
    60%  { transform: translate(200%, -50%) scale(1.6); opacity: 1; }
    100% { transform: translate(300%, -50%) scale(2.2); opacity: 0; }
  }

  /* 光のライン（文字をなぞる） */
  .light-line {
    position: absolute;
    top: 50%;
    left: -40%;
    width: 40%;
    height: 4px;
    background: linear-gradient(90deg,
      rgba(212,175,55,0) 0%,
      rgba(212,175,55,0.8) 50%,
      rgba(212,175,55,0) 100%
    );
    filter: blur(6px);
    animation: lineSweep 4s ease-in-out infinite;
  }

  @keyframes lineSweep {
    0%   { left: -40%; opacity: 0; }
    20%  { opacity: 1; }
    60%  { left: 100%; opacity: 1; }
    100% { opacity: 0; }
  }

  /* 文字の発光 */
  .glow-text {
    animation: glow 4s ease-in-out infinite;
  }

  @keyframes glow {
    0%   { filter: brightness(1); }
    30%  { filter: brightness(1); }
    60%  { filter: brightness(1.8); }
    100% { filter: brightness(1); }
  }

  /* 粒子（光の玉の後ろに散る） */
  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(212,175,55,0.8);
    border-radius: 50%;
    filter: blur(2px);
    opacity: 0;
    animation: particleFly 4s ease-out infinite;
  }

  @keyframes particleFly {
    0%   { transform: translate(0,0) scale(0.2); opacity: 0; }
    20%  { opacity: 1; }
    60%  { transform: translate(200px, -40px) scale(1); opacity: 1; }
    100% { transform: translate(260px, -60px) scale(1.2); opacity: 0; }
  }

  .about-content {
    position: relative;
    z-index: 10;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
  }

  .title {
    font-size: 48px;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }

  .frevia { color: #fff; }
  .studio { color: #d4af37; }

</style>
</head>

<body>

<header>
  <div class="logo">FREVIA</div>
</header>

<main>

<!-- ▼▼▼ ABOUT（光アニメーション） ▼▼▼ -->
<section class="about-section fade-up">

  <!-- 奥から飛んでくる光 -->
  <div class="light-orb"></div>

  <!-- 粒子を複数生成 -->
  <div class="particle" style="top:50%; left:50%; animation-delay:0s;"></div>
  <div class="particle" style="top:52%; left:48%; animation-delay:0.1s;"></div>
  <div class="particle" style="top:49%; left:51%; animation-delay:0.2s;"></div>
  <div class="particle" style="top:51%; left:49%; animation-delay:0.3s;"></div>

  <!-- 文字をなぞる光ライン -->
  <div class="light-line"></div>

  <div class="about-content glow-text">
    <h1 class="title">
      <span class="frevia">FREVIA</span>
      <span class="studio">STUDIO</span>
    </h1>
    <p class="desc">
      自由と創造をかたちにする、リメイク × ハンドメイド × IT の複合スタジオ。<br>
      シンプルで、強く、美しいものづくりを追求します。
    </p>
  </div>
</section>
<!-- ▲▲▲ ABOUT END ▲▲▲ -->


<section class="fade-up">
  <h2>ABOUT</h2>
  <p class="sub">
    FREVIAは、リメイク・ハンドメイド制作  
    ITシステム開発を組み合わせたハイブリッドスタジオです。
  </p>
</section>

<section class="fade-up">
  <h2>SERVICES</h2>
  <div class="services-grid">

    <div class="card fade-up delay-1">
      <img src="/frevia-site/images/remake.jpg" alt="Remake">
      <h3>REMAKE</h3>
      <p class="sub">服のリメイク</p>
    </div>

    <div class="card fade-up delay-2">
      <img src="/frevia-site/images/handmade.jpg" alt="Handmade">
      <h3>HANDMADE</h3>
      <p class="sub">アクセサリー・時計などの一点物の制作</p>
    </div>

    <div class="card fade-up delay-3">
      <img src="/frevia-site/images/it-flow.jpg" alt="IT Solutions">
      <h3>IT SOLUTIONS</h3>
      <p class="sub">GAS / API / 自動化ツール開発。</p>
    </div>

  </div>
</section>

<section class="fade-up">
  <h2>CONTACT</h2>
  <p class="sub">ご相談・制作依頼などお気軽にお問い合わせください。</p>
</section>

</main>

<footer>
  © FREVIA STUDIO
</footer>

<script>
  /* fade-up アニメーション */
  const targets = document.querySelectorAll('.fade-up');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('show');
    });
  }, { threshold: 0.2 });
  targets.forEach(target => observer.observe(target));
</script>

</body>
</html>
