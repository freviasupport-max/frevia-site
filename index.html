<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FREVIA – Remake / Handmade / IT</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: "Noto Sans JP", sans-serif;
    letter-spacing: 0.03em;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    box-sizing: border-box;
  }

  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.15em;
  }

  main {
    padding-top: 70px;
  }

  section {
    padding: 140px 10vw;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  h2 {
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-size: 26px;
    margin-bottom: 20px;
  }

  .sub {
    color: #ddd;
    max-width: 600px;
    line-height: 1.8;
    margin-bottom: 40px;
  }

  /* ===== HERO セクション ===== */
  .about-section {
    position: relative;
    width: 100%;
    padding: 0 !important;
    border-bottom: none !important;
    background: #000;
    overflow: hidden;
  }

  .about-section img.hero-img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* パーティクル用キャンバス */
  #particle-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    pointer-events: none;
  }

  /* タイトル */
  .about-content {
    position: absolute;
    z-index: 10;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    white-space: nowrap;
  }

  /* 半透明黒帯 */
  .title-band {
    display: inline-block;
    background: rgba(0, 0, 0, 0.52);
    padding: 14px 36px;
    border-radius: 4px;
  }

  .title {
    font-size: 48px;
    letter-spacing: 4px;
    margin: 0;
  }

  .frevia { color: #fff; }
  .studio { color: #d4af37; }

  /* ===== ABOUT ===== */
  .about-lower {
    background: #000;
  }

  /* ===== SERVICES ===== */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }

  .card {
    padding: 40px 30px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    transition: 0.3s ease;
  }

  .card:hover {
    border-color: #d9a441;
    transform: translateY(-4px);
  }

  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 6px;
    margin-bottom: 20px;
    opacity: 0.9;
    transition: 0.3s ease;
  }

  .card:hover img {
    opacity: 1;
  }

  footer {
    padding: 40px;
    text-align: center;
    color: #777;
    font-size: 14px;
  }

  .fade-up {
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.9s ease;
  }

  .fade-up.show {
    opacity: 1;
    transform: translateY(0);
  }

  .delay-1 { transition-delay: 0.1s; }
  .delay-2 { transition-delay: 0.2s; }
  .delay-3 { transition-delay: 0.3s; }
</style>
</head>

<body>

<header>
  <div class="logo">FREVIA</div>
</header>

<main>

<!-- ===== HERO ===== -->
<section class="about-section fade-up">
  <img class="hero-img" src="/frevia-site/images/about-workspace.jpg" alt="FREVIA STUDIO workspace">
  <canvas id="particle-canvas"></canvas>
  <div class="about-content">
    <div class="title-band">
      <h1 class="title">
        <span class="frevia">FREVIA</span>
        <span class="studio"> STUDIO</span>
      </h1>
    </div>
  </div>
</section>

<!-- ===== ABOUT ===== -->
<section class="about-lower fade-up">
  <h2>ABOUT</h2>
  <p class="sub">
    自由と創造をかたちにする、リメイク × ハンドメイド × IT の複合スタジオ。<br>
    繊細で、強く、美しいものづくりを追求します。
  </p>
</section>

<!-- ===== SERVICES ===== -->
<section class="fade-up">
  <h2>SERVICES</h2>
  <div class="services-grid">

    <div class="card fade-up delay-1">
      <img src="/frevia-site/images/remake.jpg" alt="Remake">
      <h3>REMAKE</h3>
      <p class="sub">服のリメイク</p>
    </div>

    <div class="card fade-up delay-2">
      <img src="/frevia-site/images/handmade.jpg" alt="Handmade">
      <h3>HANDMADE</h3>
      <p class="sub">アクセサリー・時計などの一点物の制作</p>
    </div>

    <div class="card fade-up delay-3">
      <img src="/frevia-site/images/it-flow.jpg" alt="IT Solutions">
      <h3>IT SOLUTIONS</h3>
      <p class="sub">GAS / API / 自動化ツール開発。</p>
    </div>

  </div>
</section>

<!-- ===== CONTACT ===== -->
<section class="fade-up">
  <h2>CONTACT</h2>
  <p class="sub">ご相談・制作依頼などお気軽にお問い合わせください。</p>
</section>

</main>

<footer>
  © FREVIA STUDIO
</footer>

<script>
/* ===== fade-up ===== */
const targets = document.querySelectorAll('.fade-up');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('show');
  });
}, { threshold: 0.2 });
targets.forEach(target => observer.observe(target));

/* ===== パーティクル ===== */
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animId;

function resizeCanvas() {
  const section = canvas.parentElement;
  canvas.width = section.offsetWidth;
  canvas.height = section.offsetHeight;
}

function createParticles() {
  particles = [];
  const count = Math.floor((canvas.width * canvas.height) / 8000);
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.4,
      speedX: (Math.random() - 0.5) * 0.4,
      speedY: (Math.random() - 0.5) * 0.4 - 0.3,
      alpha: Math.random() * 0.6 + 0.2,
      // ゴールド系とホワイト系をランダムで
      color: Math.random() > 0.5
        ? `rgba(255, ${180 + Math.floor(Math.random()*50)}, 80,`
        : `rgba(255, 255, ${220 + Math.floor(Math.random()*35)},`
    });
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color + p.alpha + ')';
    ctx.fill();

    p.x += p.speedX;
    p.y += p.speedY;
    p.alpha -= 0.0015;

    // 消えたら再生成
    if (p.alpha <= 0 || p.y < -10) {
      p.x = Math.random() * canvas.width;
      p.y = canvas.height + 5;
      p.alpha = Math.random() * 0.6 + 0.2;
    }
  });
  animId = requestAnimationFrame(animateParticles);
}

// 画像読み込み後にキャンバスサイズを合わせる
const heroImg = document.querySelector('.hero-img');
function initParticles() {
  resizeCanvas();
  createParticles();
  cancelAnimationFrame(animId);
  animateParticles();
}

if (heroImg.complete) {
  initParticles();
} else {
  heroImg.addEventListener('load', initParticles);
}

window.addEventListener('resize', initParticles);
</script>

</body>
</html>
