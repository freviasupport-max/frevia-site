<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FREVIA – 3D Particle Intro</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: "Noto Sans JP", sans-serif;
    overflow-x: hidden;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.15em;
  }

  .about-section {
    position: relative;
    width: 100%;
    height: 480px;
    overflow: hidden;
  }

  #three-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .title-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }

  .title {
    font-size: 56px;
    letter-spacing: 6px;
    font-weight: 700;
    color: #fff;
    text-shadow:
      0 0 20px rgba(255,215,100,0.8),
      0 0 40px rgba(255,215,100,0.6),
      0 0 80px rgba(255,215,100,0.4);
    animation: glow 4s ease-in-out infinite;
  }

  @keyframes glow {
    0%   { filter: brightness(1); }
    40%  { filter: brightness(1.4); }
    70%  { filter: brightness(2.2); }
    100% { filter: brightness(1.2); }
  }
</style>
</head>

<body>

<header>
  <div class="logo">FREVIA</div>
</header>

<section class="about-section">
  <canvas id="three-canvas"></canvas>

  <div class="title-box">
    <div class="title">FREVIA STUDIO</div>
  </div>
</section>

<!-- Three.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>
/* ============================
   3D パーティクル演出
============================ */
const canvas = document.getElementById("three-canvas");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, canvas.clientWidth / canvas.clientHeight, 1, 5000);
camera.position.z = 1000;

/* パーティクル生成 */
const COUNT = 2000;
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(COUNT * 3);

for (let i = 0; i < COUNT; i++) {
  positions[i * 3 + 0] = (Math.random() - 0.5) * 2000;
  positions[i * 3 + 1] = (Math.random() - 0.5) * 2000;
  positions[i * 3 + 2] = Math.random() * -3000; // 奥から
}

geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

const material = new THREE.PointsMaterial({
  color: 0xd4af37,
  size: 4,
  transparent: true,
  opacity: 0.9
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

/* アニメーション */
function animate() {
  const pos = geometry.attributes.position.array;

  for (let i = 0; i < COUNT; i++) {
    pos[i * 3 + 2] += 25; // 手前へ飛んでくる

    // 手前まで来たら奥へ戻す（止まらない）
    if (pos[i * 3 + 2] > 200) {
      pos[i * 3 + 0] = (Math.random() - 0.5) * 2000;
      pos[i * 3 + 1] = (Math.random() - 0.5) * 2000;
      pos[i * 3 + 2] = -3000;
    }
  }

  geometry.attributes.position.needsUpdate = true;

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

animate();

/* リサイズ対応 */
window.addEventListener("resize", () => {
  renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
  camera.aspect = canvas.clientWidth / canvas.clientHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
