<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FREVIA – Remake / Handmade / IT</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: "Noto Sans JP", sans-serif;
    letter-spacing: 0.03em;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.15em;
  }

  main {
    padding-top: 120px;
  }

  section {
    padding: 140px 10vw;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  h1, h2 {
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  h1 {
    font-size: 42px;
    margin-bottom: 20px;
  }

  h2 {
    font-size: 26px;
    margin-bottom: 20px;
  }

  .accent {
    color: #d9a441;
  }

  .sub {
    color: #aaa;
    max-width: 600px;
    line-height: 1.8;
    margin-bottom: 40px;
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }

  .card {
    padding: 40px 30px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    transition: 0.3s ease;
  }

  .card:hover {
    border-color: #d9a441;
    transform: translateY(-4px);
  }

  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 6px;
    margin-bottom: 20px;
    opacity: 0.9;
    transition: 0.3s ease;
  }

  .card:hover img {
    opacity: 1;
  }

  footer {
    padding: 40px;
    text-align: center;
    color: #777;
    font-size: 14px;
  }

  .fade-up {
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.9s ease;
  }

  .fade-up.show {
    opacity: 1;
    transform: translateY(0);
  }

  .delay-1 { transition-delay: 0.1s; }
  .delay-2 { transition-delay: 0.2s; }
  .delay-3 { transition-delay: 0.3s; }

  /* ▼▼▼ 粒子アニメーション用 CSS ▼▼▼ */
  .about-section {
    position: relative;
    width: 100%;
    height: 420px;
    overflow: hidden;
    background: #000;

    /* ← ズレ完全防止 */
    padding: 0 !important;
    border-bottom: none !important;
  }

  #frevia-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  .about-content {
    position: relative;
    z-index: 10;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
    color: white;
    padding: 0 10vw;
  }

  .title {
    font-size: 48px;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }

  .frevia {
    color: #ffffff;
  }

  .studio {
    color: #d4af37;
  }

  .desc {
    font-size: 16px;
    line-height: 1.8;
    opacity: 0.9;
  }
  /* ▲▲▲ 粒子アニメーション CSS ▲▲▲ */

</style>
</head>

<body>

<header>
  <div class="logo">FREVIA</div>
</header>

<main>

<!-- ▼▼▼ 粒子アニメーション ABOUT ▼▼▼ -->
<section class="about-section fade-up">
  <canvas id="frevia-bg"></canvas>

  <div class="about-content">
    <h1 class="title">
      <span class="frevia">FREVIA</span>
      <span class="studio">STUDIO</span>
    </h1>
    <p class="desc">
      自由と創造をかたちにする、リメイク × ハンドメイド × IT の複合スタジオ。<br>
      シンプルで、強く、美しいものづくりを追求します。
    </p>
  </div>
</section>
<!-- ▲▲▲ 粒子アニメーション ABOUT ▲▲▲ -->


<section class="fade-up">
  <h2>ABOUT</h2>
  <p class="sub">
    FREVIAは、リメイク・ハンドメイド制作  
    ITシステム開発を組み合わせたハイブリッドスタジオです。
  </p>
</section>

<section class="fade-up">
  <h2>SERVICES</h2>
  <div class="services-grid">

    <div class="card fade-up delay-1">
      <img src="/frevia-site/images/remake.jpg" alt="Remake">
      <h3>REMAKE</h3>
      <p class="sub">服のリメイク</p>
    </div>

    <div class="card fade-up delay-2">
      <img src="/frevia-site/images/handmade.jpg" alt="Handmade">
      <h3>HANDMADE</h3>
      <p class="sub">アクセサリー・時計などの一点物の制作</p>
    </div>

    <div class="card fade-up delay-3">
      <img src="/frevia-site/images/it-flow.jpg" alt="IT Solutions">
      <h3>IT SOLUTIONS</h3>
      <p class="sub">GAS / API / 自動化ツール開発。</p>
    </div>

  </div>
</section>

<section class="fade-up">
  <h2>CONTACT</h2>
  <p class="sub">ご相談・制作依頼などお気軽にお問い合わせください。</p>
</section>

</main>

<footer>
  © FREVIA STUDIO
</footer>

<script>
  /* ▼▼▼ fade-up アニメーション ▼▼▼ */
  const targets = document.querySelectorAll('.fade-up');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('show');
      }
    });
  }, { threshold: 0.2 });

  targets.forEach(target => observer.observe(target));
  /* ▲▲▲ fade-up ▲▲▲ */


  /* ▼▼▼ 粒子アニメーション ▼▼▼ */
  const canvas = document.getElementById('frevia-bg');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const CENTER = {
    x: () => canvas.width / 2,
    y: () => canvas.height / 2
  };

  const DURATION = 10000;

  const particles = Array.from({ length: 200 }).map(() => {
    const angle = Math.random() * Math.PI * 2;
    const radius = Math.max(canvas.width, canvas.height) * (0.6 + Math.random() * 0.6);
    return {
      sx: CENTER.x() + Math.cos(angle) * radius,
      sy: CENTER.y() + Math.sin(angle) * radius,
      tx: CENTER.x() + (Math.random() - 0.5) * 80,
      ty: CENTER.y() + (Math.random() - 0.5) * 80,
      size: 1 + Math.random() * 2,
      delay: Math.random()
    };
  });

  function lerp(a, b, t) { return a + (b - a) * t; }

  function easeInOut(t) {
    return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  }

  function draw(time) {
    const tGlobal = (time % DURATION) / DURATION;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const cg = ctx.createRadialGradient(
      CENTER.x(), CENTER.y(), 0,
      CENTER.x(), CENTER.y(), 200
    );
    cg.addColorStop(0, 'rgba(212,175,55,0.35)');
    cg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = 'rgba(212,175,55,0.9)';
    particles.forEach(p => {
      let t = (tGlobal + p.delay) % 1;
      const dir = t < 0.5 ? t / 0.5 : (1 - t) / 0.5;
      const e = easeInOut(dir);

      const x = lerp(p.sx, p.tx, e);
      const y = lerp(p.sy, p.ty, e);

      ctx.beginPath();
      ctx.arc(x, y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
  /* ▲▲▲ 粒子アニメーション ▲▲▲ */

</script>

</body>
</html>
