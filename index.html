<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FREVIA – Shockwave 3D Intro</title>

<style>
  body {
    margin: 0;
    background: #000;
    overflow: hidden;
    font-family: "Noto Sans JP", sans-serif;
  }

  .title-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 56px;
    letter-spacing: 6px;
    font-weight: 700;
    text-align: center;
    pointer-events: none;
    z-index: 10;
    text-shadow:
      0 0 20px rgba(255,215,100,0.9),
      0 0 40px rgba(255,215,100,0.7),
      0 0 80px rgba(255,215,100,0.5);
}
</style>
</head>

<body>

<div class="title-box">FREVIA STUDIO</div>

<canvas id="webgl"></canvas>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<!-- PostProcessing -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
/* ============================
   基本セットアップ
============================ */
const canvas = document.getElementById("webgl");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  1,
  5000
);
camera.position.z = 1200;

/* ============================
   メイン粒子（奥から飛んでくる）
============================ */
const MAIN_COUNT = 4000;
const mainGeo = new THREE.BufferGeometry();
const mainPos = new Float32Array(MAIN_COUNT * 3);

for (let i = 0; i < MAIN_COUNT; i++) {
  mainPos[i * 3 + 0] = (Math.random() - 0.5) * 2200;
  mainPos[i * 3 + 1] = (Math.random() - 0.5) * 2200;
  mainPos[i * 3 + 2] = Math.random() * -4500;
}

mainGeo.setAttribute("position", new THREE.BufferAttribute(mainPos, 3));

const mainMat = new THREE.PointsMaterial({
  color: 0xd4af37,
  size: 4,
  transparent: true,
  opacity: 0.95
});

const mainParticles = new THREE.Points(mainGeo, mainMat);
scene.add(mainParticles);

/* ============================
   アンビエント粒子（周囲に漂う）
============================ */
const AMBIENT_COUNT = 1500;
const ambGeo = new THREE.BufferGeometry();
const ambPos = new Float32Array(AMBIENT_COUNT * 3);

for (let i = 0; i < AMBIENT_COUNT; i++) {
  ambPos[i * 3 + 0] = (Math.random() - 0.5) * 3000;
  ambPos[i * 3 + 1] = (Math.random() - 0.5) * 3000;
  ambPos[i * 3 + 2] = (Math.random() - 0.5) * 3000;
}

ambGeo.setAttribute("position", new THREE.BufferAttribute(ambPos, 3));

const ambMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 2,
  transparent: true,
  opacity: 0.4
});

const ambientParticles = new THREE.Points(ambGeo, ambMat);
scene.add(ambientParticles);

/* ============================
   Shockwave Shader（破裂波）
============================ */
const ShockwaveShader = {
  uniforms: {
    tDiffuse: { value: null },
    time: { value: 0.0 },
    center: { value: new THREE.Vector2(0.5, 0.5) }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float time;
    uniform vec2 center;
    varying vec2 vUv;

    void main() {
      vec2 uv = vUv;
      vec2 dir = uv - center;
      float dist = length(dir);

      float wave = sin((dist - time * 1.7) * 45.0) * 0.04;
      wave *= smoothstep(0.45, 0.0, abs(dist - time));

      uv += normalize(dir) * wave;

      vec4 color = texture2D(tDiffuse, uv);

      float glow = smoothstep(0.02, 0.0, abs(dist - time));
      color += vec4(1.0, 0.95, 0.7, 1.0) * glow * 1.0;

      gl_FragColor = color;
    }
  `
};

/* ============================
   ポストプロセス
============================ */
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));

const bloomPass = new THREE.UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.8,
  0.4,
  0.85
);
composer.addPass(bloomPass);

const shockwavePass = new THREE.ShaderPass(ShockwaveShader);
composer.addPass(shockwavePass);

/* ============================
   アニメーション
============================ */
let t = 0;

function animate() {
  t += 0.012;
  shockwavePass.uniforms.time.value = (t % 1.1);

  /* メイン粒子（奥→手前） */
  const mp = mainGeo.attributes.position.array;
  for (let i = 0; i < MAIN_COUNT; i++) {
    mp[i * 3 + 2] += 40;

    if (mp[i * 3 + 2] > 250) {
      mp[i * 3 + 0] = (Math.random() - 0.5) * 2200;
      mp[i * 3 + 1] = (Math.random() - 0.5) * 2200;
      mp[i * 3 + 2] = -4500;
    }
  }
  mainGeo.attributes.position.needsUpdate = true;

  /* アンビエント粒子（ゆっくり漂う） */
  const ap = ambGeo.attributes.position.array;
  for (let i = 0; i < AMBIENT_COUNT; i++) {
    ap[i * 3 + 0] += Math.sin(t + i) * 0.2;
    ap[i * 3 + 1] += Math.cos(t + i) * 0.2;
  }
  ambGeo.attributes.position.needsUpdate = true;

  composer.render();
  requestAnimationFrame(animate);
}

animate();

/* ============================
   リサイズ
============================ */
window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
