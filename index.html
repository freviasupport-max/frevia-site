<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FREVIA – Remake / Handmade / IT</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: "Noto Sans JP", sans-serif;
    letter-spacing: 0.03em;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.15em;
  }

  main {
    padding-top: 120px;
  }

  section {
    padding: 140px 10vw;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  /* ===== ABOUT セクション（3D粒子） ===== */
  .about-section {
    position: relative;
    width: 100%;
    height: 420px;
    overflow: hidden;
    background: #000;
    padding: 0 !important;
    border-bottom: none !important;
  }

  #particle3d {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  /* 光ライン（文字をなぞる） */
  .light-line {
    position: absolute;
    top: 50%;
    left: -40%;
    width: 40%;
    height: 4px;
    background: linear-gradient(90deg,
      rgba(212,175,55,0) 0%,
      rgba(212,175,55,1) 50%,
      rgba(212,175,55,0) 100%
    );
    filter: blur(6px);
    animation: lineSweep 5s ease-in-out infinite;
  }

  @keyframes lineSweep {
    0%   { left: -40%; opacity: 0; }
    55%  { opacity: 0; }
    65%  { opacity: 1; }
    85%  { left: 100%; opacity: 1; }
    100% { opacity: 0; }
  }

  /* 文字の発光 */
  .glow-text {
    animation: glow 5s ease-in-out infinite;
  }

  @keyframes glow {
    0%   { filter: brightness(1); }
    55%  { filter: brightness(1); }
    75%  { filter: brightness(2); }
    100% { filter: brightness(1); }
  }

  .about-content {
    position: relative;
    z-index: 10;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
  }

  .title {
    font-size: 48px;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }

  .frevia { color: #fff; }
  .studio { color: #d4af37; }

  .desc {
    font-size: 16px;
    line-height: 1.8;
    opacity: 0.9;
  }
</style>
</head>

<body>

<header>
  <div class="logo">FREVIA</div>
</header>

<main>

<!-- ===== ABOUT（3D粒子 → 集約 → 発光 → 離散） ===== -->
<section class="about-section fade-up">
  <canvas id="particle3d"></canvas>
  <div class="light-line"></div>

  <div class="about-content glow-text">
    <h1 class="title">
      <span class="frevia">FREVIA</span>
      <span class="studio">STUDIO</span>
    </h1>
    <p class="desc">
      自由と創造をかたちにする、リメイク × ハンドメイド × IT の複合スタジオ。<br>
      シンプルで、強く、美しいものづくりを追求します。
    </p>
  </div>
</section>

<!-- ===== 以下そのまま ===== -->
<section class="fade-up">
  <h2>ABOUT</h2>
  <p class="sub">
    FREVIAは、リメイク・ハンドメイド制作  
    ITシステム開発を組み合わせたハイブリッドスタジオです。
  </p>
</section>

<section class="fade-up">
  <h2>SERVICES</h2>
  <div class="services-grid">

    <div class="card fade-up delay-1">
      <img src="/frevia-site/images/remake.jpg" alt="Remake">
      <h3>REMAKE</h3>
      <p class="sub">服のリメイク</p>
    </div>

    <div class="card fade-up delay-2">
      <img src="/frevia-site/images/handmade.jpg" alt="Handmade">
      <h3>HANDMADE</h3>
      <p class="sub">アクセサリー・時計などの一点物の制作</p>
    </div>

    <div class="card fade-up delay-3">
      <img src="/frevia-site/images/it-flow.jpg" alt="IT Solutions">
      <h3>IT SOLUTIONS</h3>
      <p class="sub">GAS / API / 自動化ツール開発。</p>
    </div>

  </div>
</section>

<section class="fade-up">
  <h2>CONTACT</h2>
  <p class="sub">ご相談・制作依頼などお気軽にお問い合わせください。</p>
</section>

</main>

<footer>
  © FREVIA STUDIO
</footer>

<script>
/* ===== fade-up ===== */
const targets = document.querySelectorAll('.fade-up');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('show');
  });
}, { threshold: 0.2 });
targets.forEach(target => observer.observe(target));

/* ===== 3D粒子（奥→手前→集約→離散） ===== */
const canvas = document.getElementById("particle3d");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
window.addEventListener("resize", resize);
resize();

const COUNT = 300;
let particles = [];

function init() {
  particles = [];
  for (let i = 0; i < COUNT; i++) {
    particles.push({
      x: (Math.random() - 0.5) * 800,
      y: (Math.random() - 0.5) * 800,
      z: Math.random() * 2000 + 500, // 奥行き
      size: 1 + Math.random() * 2,
      speed: 4 + Math.random() * 4
    });
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  particles.forEach(p => {
    p.z -= p.speed;

    // 手前に来たら中央に吸い込まれる
    if (p.z < 50) {
      p.x *= 0.9;
      p.y *= 0.9;
    }

    // さらに近づいたら離散
    if (p.z < 10) {
      p.x += (Math.random() - 0.5) * 40;
      p.y += (Math.random() - 0.5) * 40;
    }

    // 消えたらリセット
    if (p.z < 1) {
      p.x = (Math.random() - 0.5) * 800;
      p.y = (Math.random() - 0.5) * 800;
      p.z = Math.random() * 2000 + 500;
    }

    const scale = 200 / p.z;
    const x2d = cx + p.x * scale;
    const y2d = cy + p.y * scale;

    ctx.fillStyle = "rgba(212,175,55," + (1 - p.z / 2000) + ")";
    ctx.beginPath();
    ctx.arc(x2d, y2d, p.size * scale, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

init();
animate();
</script>

</body>
</html>
