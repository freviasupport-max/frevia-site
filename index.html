<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FREVIA – Remake / Handmade / IT</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: "Noto Sans JP", sans-serif;
    letter-spacing: 0.03em;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.15em;
  }

  main {
    padding-top: 120px;
  }

  section {
    padding: 140px 10vw;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  /* ===== ABOUT セクション（粒子集約＋光ライン） ===== */
  .about-section {
    position: relative;
    width: 100%;
    height: 420px;
    overflow: hidden;
    background: #000;
    padding: 0 !important;
    border-bottom: none !important;
  }

  /* 背景粒子 */
  #particle-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  /* 光ライン（文字をなぞる） */
  .light-line {
    position: absolute;
    top: 50%;
    left: -40%;
    width: 40%;
    height: 4px;
    background: linear-gradient(90deg,
      rgba(212,175,55,0) 0%,
      rgba(212,175,55,0.9) 50%,
      rgba(212,175,55,0) 100%
    );
    filter: blur(6px);
    animation: lineSweep 5s ease-in-out infinite;
  }

  @keyframes lineSweep {
    0%   { left: -40%; opacity: 0; }
    40%  { opacity: 0; }
    55%  { opacity: 1; }
    80%  { left: 100%; opacity: 1; }
    100% { opacity: 0; }
  }

  /* 文字の発光 */
  .glow-text {
    animation: glow 5s ease-in-out infinite;
  }

  @keyframes glow {
    0%   { filter: brightness(1); }
    40%  { filter: brightness(1); }
    60%  { filter: brightness(1.8); }
    100% { filter: brightness(1); }
  }

  .about-content {
    position: relative;
    z-index: 10;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
  }

  .title {
    font-size: 48px;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }

  .frevia { color: #fff; }
  .studio { color: #d4af37; }

  .desc {
    font-size: 16px;
    line-height: 1.8;
    opacity: 0.9;
  }
</style>
</head>

<body>

<header>
  <div class="logo">FREVIA</div>
</header>

<main>

<!-- ===== ABOUT（粒子集約＋光ライン） ===== -->
<section class="about-section fade-up">
  <canvas id="particle-canvas"></canvas>
  <div class="light-line"></div>

  <div class="about-content glow-text">
    <h1 class="title">
      <span class="frevia">FREVIA</span>
      <span class="studio">STUDIO</span>
    </h1>
    <p class="desc">
      自由と創造をかたちにする、リメイク × ハンドメイド × IT の複合スタジオ。<br>
      シンプルで、強く、美しいものづくりを追求します。
    </p>
  </div>
</section>

<!-- ===== 以下はそのまま ===== -->
<section class="fade-up">
  <h2>ABOUT</h2>
  <p class="sub">
    FREVIAは、リメイク・ハンドメイド制作  
    ITシステム開発を組み合わせたハイブリッドスタジオです。
  </p>
</section>

<section class="fade-up">
  <h2>SERVICES</h2>
  <div class="services-grid">

    <div class="card fade-up delay-1">
      <img src="/frevia-site/images/remake.jpg" alt="Remake">
      <h3>REMAKE</h3>
      <p class="sub">服のリメイク</p>
    </div>

    <div class="card fade-up delay-2">
      <img src="/frevia-site/images/handmade.jpg" alt="Handmade">
      <h3>HANDMADE</h3>
      <p class="sub">アクセサリー・時計などの一点物の制作</p>
    </div>

    <div class="card fade-up delay-3">
      <img src="/frevia-site/images/it-flow.jpg" alt="IT Solutions">
      <h3>IT SOLUTIONS</h3>
      <p class="sub">GAS / API / 自動化ツール開発。</p>
    </div>

  </div>
</section>

<section class="fade-up">
  <h2>CONTACT</h2>
  <p class="sub">ご相談・制作依頼などお気軽にお問い合わせください。</p>
</section>

</main>

<footer>
  © FREVIA STUDIO
</footer>

<script>
/* ===== fade-up ===== */
const targets = document.querySelectorAll('.fade-up');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('show');
  });
}, { threshold: 0.2 });
targets.forEach(target => observer.observe(target));

/* ===== 粒子アニメーション（集約 → 光の玉化） ===== */
const canvas = document.getElementById("particle-canvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
window.addEventListener("resize", resize);
resize();

let particles = [];
const COUNT = 200;

function initParticles() {
  particles = [];
  for (let i = 0; i < COUNT; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: 1 + Math.random() * 2,
      angle: Math.random() * Math.PI * 2,
      speed: 0.5 + Math.random() * 1,
      delay: Math.random() * 2
    });
  }
}

function animate(time) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const t = (time % 5000) / 5000; // 5秒ループ
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;

  particles.forEach(p => {
    let progress = Math.max(0, t - p.delay * 0.2);
    if (progress > 1) progress = 1;

    // 粒子が中心に吸い寄せられる
    p.x += (centerX - p.x) * 0.02 * progress;
    p.y += (centerY - p.y) * 0.02 * progress;

    ctx.fillStyle = "rgba(212,175,55," + (0.3 + progress * 0.7) + ")";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

initParticles();
requestAnimationFrame(animate);
</script>

</body>
</html>
