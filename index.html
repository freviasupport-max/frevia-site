<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FREVIA – Remake / Handmade / IT</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: "Noto Sans JP", sans-serif;
    letter-spacing: 0.03em;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    box-sizing: border-box;
  }

  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.15em;
  }

  main {
    padding-top: 70px;
  }

  section {
    padding: 140px 10vw;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  h2 {
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-size: 26px;
    margin-bottom: 20px;
  }

  .sub {
    color: #ddd;
    max-width: 600px;
    line-height: 1.8;
    margin-bottom: 40px;
  }

  /* ===== HERO + ABOUT を一体化したセクション ===== */
  .hero-about-section {
    position: relative;
    width: 100%;
    padding: 0 !important;
    border-bottom: 1px solid rgba(255,255,255,0.08) !important;
  }

  /* 画像を切り取らず全体表示 */
  .hero-about-section img.hero-img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* 画像の下半分〜ABOUTエリアにかけて黒フェード */
  .hero-about-section::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 60%;
    background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 50%, #000 100%);
    pointer-events: none;
  }

  /* FREVIA STUDIO タイトル（画像中央） */
  .hero-title {
    position: absolute;
    z-index: 10;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    white-space: nowrap;
  }

  .hero-title h1 {
    font-size: 48px;
    letter-spacing: 4px;
    margin: 0;
  }

  .frevia { color: #fff; }
  .studio { color: #d4af37; }

  /* ABOUT テキスト（画像の下・フェードエリア内） */
  .about-overlay {
    position: absolute;
    z-index: 10;
    bottom: 0;
    left: 0;
    padding: 0 10vw 60px;
  }

  .about-overlay h2 {
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-size: 26px;
    margin-bottom: 16px;
  }

  .about-overlay p {
    color: #ccc;
    max-width: 600px;
    line-height: 1.8;
    margin: 0;
    font-size: 15px;
  }

  /* ===== SERVICES ===== */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }

  .card {
    padding: 40px 30px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    transition: 0.3s ease;
  }

  .card:hover {
    border-color: #d9a441;
    transform: translateY(-4px);
  }

  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 6px;
    margin-bottom: 20px;
    opacity: 0.9;
    transition: 0.3s ease;
  }

  .card:hover img {
    opacity: 1;
  }

  footer {
    padding: 40px;
    text-align: center;
    color: #777;
    font-size: 14px;
  }

  .fade-up {
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.9s ease;
  }

  .fade-up.show {
    opacity: 1;
    transform: translateY(0);
  }

  .delay-1 { transition-delay: 0.1s; }
  .delay-2 { transition-delay: 0.2s; }
  .delay-3 { transition-delay: 0.3s; }

</style>
</head>

<body>

<header>
  <div class="logo">FREVIA</div>
</header>

<main>

<!-- ===== HERO + ABOUT 一体セクション ===== -->
<section class="hero-about-section fade-up">

  <!-- 本来の画像（切り取りなし・全体表示） -->
  <img class="hero-img" src="/frevia-site/images/about-workspace.jpg" alt="FREVIA STUDIO workspace">

  <!-- FREVIA STUDIO タイトル（画像中央） -->
  <div class="hero-title">
    <h1>
      <span class="frevia">FREVIA</span>
      <span class="studio"> STUDIO</span>
    </h1>
  </div>

  <!-- ABOUT テキスト（画像下部のフェードエリアに重ねて表示） -->
  <div class="about-overlay">
    <h2>ABOUT</h2>
    <p>
      自由と創造をかたちにする、リメイク × ハンドメイド × IT の複合スタジオ。<br>
      繊細で、強く、美しいものづくりを追求します。
    </p>
  </div>

</section>

<!-- ===== SERVICES ===== -->
<section class="fade-up">
  <h2>SERVICES</h2>
  <div class="services-grid">

    <div class="card fade-up delay-1">
      <img src="/frevia-site/images/remake.jpg" alt="Remake">
      <h3>REMAKE</h3>
      <p class="sub">服のリメイク</p>
    </div>

    <div class="card fade-up delay-2">
      <img src="/frevia-site/images/handmade.jpg" alt="Handmade">
      <h3>HANDMADE</h3>
      <p class="sub">アクセサリー・時計などの一点物の制作</p>
    </div>

    <div class="card fade-up delay-3">
      <img src="/frevia-site/images/it-flow.jpg" alt="IT Solutions">
      <h3>IT SOLUTIONS</h3>
      <p class="sub">GAS / API / 自動化ツール開発。</p>
    </div>

  </div>
</section>

<!-- ===== CONTACT ===== -->
<section class="fade-up">
  <h2>CONTACT</h2>
  <p class="sub">ご相談・制作依頼などお気軽にお問い合わせください。</p>
</section>

</main>

<footer>
  © FREVIA STUDIO
</footer>

<script>
/* fade-up */
const targets = document.querySelectorAll('.fade-up');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('show');
  });
}, { threshold: 0.2 });
targets.forEach(target => observer.observe(target));
</script>

</body>
</html>
