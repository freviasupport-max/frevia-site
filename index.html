<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FREVIA – Remake / Handmade / IT</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: "Noto Sans JP", sans-serif;
    letter-spacing: 0.03em;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.15em;
  }

  main {
    padding-top: 120px;
  }

  section {
    padding: 140px 10vw;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  h2 {
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-size: 26px;
    margin-bottom: 20px;
  }

  .sub {
    color: #ddd;
    max-width: 600px;
    line-height: 1.8;
    margin-bottom: 40px;
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }

  .card {
    padding: 40px 30px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    transition: 0.3s ease;
  }

  .card:hover {
    border-color: #d9a441;
    transform: translateY(-4px);
  }

  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 6px;
    margin-bottom: 20px;
    opacity: 0.9;
    transition: 0.3s ease;
  }

  .card:hover img {
    opacity: 1;
  }

  footer {
    padding: 40px;
    text-align: center;
    color: #777;
    font-size: 14px;
  }

  .fade-up {
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.9s ease;
  }

  .fade-up.show {
    opacity: 1;
    transform: translateY(0);
  }

  .delay-1 { transition-delay: 0.1s; }
  .delay-2 { transition-delay: 0.2s; }
  .delay-3 { transition-delay: 0.3s; }

  /* ===== ABOUT（上） ===== */
  .about-section {
    position: relative;
    width: 100%;
    height: 420px;
    overflow: hidden;
    background: url("/frevia-site/images/about-workspace.jpg") center/cover no-repeat;
    padding: 0 !important;
    border-bottom: none !important;
  }

  .about-content {
    position: relative;
    z-index: 10;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
  }

  .title {
    font-size: 48px;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }

  .frevia { color: #fff; }
  .studio { color: #d4af37; }

  .desc {
    font-size: 16px;
    line-height: 1.8;
    opacity: 0.9;
  }

  /* ===== ABOUT（下）も工房写真で統一 ===== */
  .about-lower {
    position: relative;
    width: 100%;
    padding: 140px 10vw;
    background: url("/frevia-site/images/about-workspace.jpg") center/cover no-repeat;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    color: #fff;
  }

  /* 黒の半透明レイヤー（読みやすさUP） */
  .about-lower::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 1;
  }

  .about-lower h2,
  .about-lower p {
    position: relative;
    z-index: 2;
  }

</style>
</head>

<body>

<header>
  <div class="logo">FREVIA</div>
</header>

<main>

<!-- ===== ABOUT（上） ===== -->
<section class="about-section fade-up">
  <div class="about-content">
    <h1 class="title">
      <span class="frevia">FREVIA</span>
      <span class="studio">STUDIO</span>
    </h1>
    <p class="desc">
      自由と創造をかたちにする、リメイク × ハンドメイド × IT の複合スタジオ。<br>
      シンプルで、強く、美しいものづくりを追求します。
    </p>
  </div>
</section>

<!-- ===== ABOUT（下）も工房写真で統一 ===== -->
<section class="about-lower fade-up">
  <h2>ABOUT</h2>
  <p class="sub">
    FREVIAは、リメイク・ハンドメイド制作  
    ITシステム開発を組み合わせたハイブリッドスタジオです。
  </p>
</section>

<section class="fade-up">
  <h2>SERVICES</h2>
  <div class="services-grid">

    <div class="card fade-up delay-1">
      <img src="/frevia-site/images/remake.jpg" alt="Remake">
      <h3>REMAKE</h3>
      <p class="sub">服のリメイク</p>
    </div>

    <div class="card fade-up delay-2">
      <img src="/frevia-site/images/handmade.jpg" alt="Handmade">
      <h3>HANDMADE</h3>
      <p class="sub">アクセサリー・時計などの一点物の制作</p>
    </div>

    <div class="card fade-up delay-3">
      <img src="/frevia-site/images/it-flow.jpg" alt="IT Solutions">
      <h3>IT SOLUTIONS</h3>
      <p class="sub">GAS / API / 自動化ツール開発。</p>
    </div>

  </div>
</section>

<section class="fade-up">
  <h2>CONTACT</h2>
  <p class="sub">ご相談・制作依頼などお気軽にお問い合わせください。</p>
</section>

</main>

<footer>
  © FREVIA STUDIO
</footer>

<script>
/* fade-up */
const targets = document.querySelectorAll('.fade-up');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('show');
  });
}, { threshold: 0.2 });
targets.forEach(target => observer.observe(target));
</script>

</body>
</html>
