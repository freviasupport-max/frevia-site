<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FREVIA – Remake / Handmade / IT</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: "Noto Sans JP", sans-serif;
    letter-spacing: 0.03em;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.15em;
  }

  main {
    padding-top: 120px;
  }

  section {
    padding: 140px 10vw;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  h2 {
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-size: 26px;
    margin-bottom: 20px;
  }

  .sub {
    color: #aaa;
    max-width: 600px;
    line-height: 1.8;
    margin-bottom: 40px;
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }

  .card {
    padding: 40px 30px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    transition: 0.3s ease;
  }

  .card:hover {
    border-color: #d9a441;
    transform: translateY(-4px);
  }

  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 6px;
    margin-bottom: 20px;
    opacity: 0.9;
    transition: 0.3s ease;
  }

  .card:hover img {
    opacity: 1;
  }

  footer {
    padding: 40px;
    text-align: center;
    color: #777;
    font-size: 14px;
  }

  .fade-up {
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.9s ease;
  }

  .fade-up.show {
    opacity: 1;
    transform: translateY(0);
  }

  .delay-1 { transition-delay: 0.1s; }
  .delay-2 { transition-delay: 0.2s; }
  .delay-3 { transition-delay: 0.3s; }

  /* ===== ABOUT セクション（3D Shockwave） ===== */
  .about-section {
    position: relative;
    width: 100%;
    height: 600px;
    overflow: hidden;
    background: #000;
    padding: 0 !important;
    border-bottom: none !important;
  }

  @media (max-width: 768px) {
    .about-section {
      height: 420px;
    }
  }

  #three-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .about-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    text-align: center;
  }

  .title {
    font-size: 48px;
    letter-spacing: 4px;
    margin-bottom: 12px;
    text-shadow:
      0 0 20px rgba(255,215,100,0.9),
      0 0 40px rgba(255,215,100,0.7),
      0 0 80px rgba(255,215,100,0.5);
  }

  .frevia { color: #fff; }
  .studio { color: #d4af37; }

  .desc {
    font-size: 16px;
    line-height: 1.8;
    opacity: 0.9;
  }
</style>
</head>

<body>

<header>
  <div class="logo">FREVIA</div>
</header>

<main>

<!-- ===== ABOUT（Shockwave × 3D 粒子 × Ambient 粒子） ===== -->
<section class="about-section fade-up">
  <canvas id="three-canvas"></canvas>

  <div class="about-content">
    <h1 class="title">
      <span class="frevia">FREVIA</span>
      <span class="studio">STUDIO</span>
    </h1>
    <p class="desc">
      自由と創造をかたちにする、リメイク × ハンドメイド × IT の複合スタジオ。<br>
      シンプルで、強く、美しいものづくりを追求します。
    </p>
  </div>
</section>

<section class="fade-up">
  <h2>ABOUT</h2>
  <p class="sub">
    FREVIAは、リメイク・ハンドメイド制作  
    ITシステム開発を組み合わせたハイブリッドスタジオです。
  </p>
</section>

<section class="fade-up">
  <h2>SERVICES</h2>
  <div class="services-grid">

    <div class="card fade-up delay-1">
      <img src="/frevia-site/images/remake.jpg" alt="Remake">
      <h3>REMAKE</h3>
      <p class="sub">服のリメイク</p>
    </div>

    <div class="card fade-up delay-2">
      <img src="/frevia-site/images/handmade.jpg" alt="Handmade">
      <h3>HANDMADE</h3>
      <p class="sub">アクセサリー・時計などの一点物の制作</p>
    </div>

    <div class="card fade-up delay-3">
      <img src="/frevia-site/images/it-flow.jpg" alt="IT Solutions">
      <h3>IT SOLUTIONS</h3>
      <p class="sub">GAS / API / 自動化ツール開発。</p>
    </div>

  </div>
</section>

<section class="fade-up">
  <h2>CONTACT</h2>
  <p class="sub">ご相談・制作依頼などお気軽にお問い合わせください。</p>
</section>

</main>

<footer>
  © FREVIA STUDIO
</footer>

<!-- Three.js（unpkg 版：確実に読み込まれる） -->
<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>

<!-- PostProcessing（unpkg 版） -->
<script src="https://unpkg.com/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.152.2/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://unpkg.com/three@0.152.2/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
/* fade-up */
const targets = document.querySelectorAll('.fade-up');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('show');
  });
}, { threshold: 0.2 });
targets.forEach(target => observer.observe(target));

/* ============================
   Three.js Shockwave Intro
============================ */
const canvas3d = document.getElementById("three-canvas");
const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);

function resizeRenderer() {
  const w = canvas3d.offsetWidth;
  const h = canvas3d.offsetHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resizeRenderer);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, canvas3d.offsetWidth / canvas3d.offsetHeight, 1, 5000);
camera.position.z = 1200;

/* メイン粒子 */
const MAIN_COUNT = 4000;
const mainGeo = new THREE.BufferGeometry();
const mainPos = new Float32Array(MAIN_COUNT * 3);

for (let i = 0; i < MAIN_COUNT; i++) {
  mainPos[i * 3 + 0] = (Math.random() - 0.5) * 2200;
  mainPos[i * 3 + 1] = (Math.random() - 0.5) * 2200;
  mainPos[i * 3 + 2] = Math.random() * -4500;
}

mainGeo.setAttribute("position", new THREE.BufferAttribute(mainPos, 3));

const mainMat = new THREE.PointsMaterial({
  color: 0xd4af37,
  size: 4,
  transparent: true,
  opacity: 0.95
});

const mainParticles = new THREE.Points(mainGeo, mainMat);
scene.add(mainParticles);

/* Ambient 粒子 */
const AMBIENT_COUNT = 1500;
const ambGeo = new THREE.BufferGeometry();
const ambPos = new Float32Array(AMBIENT_COUNT * 3);

for (let i = 0; i < AMBIENT_COUNT; i++) {
  ambPos[i * 3 + 0] = (Math.random() - 0.5) * 3000;
  ambPos[i * 3 + 1] = (Math.random() - 0.5) * 3000;
  ambPos[i * 3 + 2] = (Math.random() - 0.5) * 3000;
}

ambGeo.setAttribute("position", new THREE.BufferAttribute(ambPos, 3));

const ambMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 2,
  transparent: true,
  opacity: 0.4
});

const ambientParticles = new THREE.Points(ambGeo, ambMat);
scene.add(ambientParticles);

/* Shockwave Shader */
const ShockwaveShader = {
  uniforms: {
    tDiffuse: { value: null },
    time: { value: 0.0 },
    center: { value: new THREE.Vector2(0.5, 0.5) }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float time;
    uniform vec2 center;
    varying vec2 vUv;

    void main() {
      vec2 uv = vUv;
      vec2 dir = uv - center;
      float dist = length(dir);

      float wave = sin((dist - time * 2.0) * 55.0) * 0.06;
      wave *= smoothstep(0.55, 0.0, abs(dist - time));

      uv += normalize(dir) * wave;

      vec4 color = texture2D(tDiffuse, uv);

      float glow = smoothstep(0.02, 0.0, abs(dist - time));
      color += vec4(1.0, 0.95, 0.7, 1.0) * glow * 1.4;

      gl_FragColor = color;
    }
  `
};

/* PostProcessing */
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));

const bloomPass = new THREE.UnrealBloomPass(
  new THREE.Vector2(canvas3d.offsetWidth, canvas3d.offsetHeight),
  1.8,
  0.4,
  0.85
);
composer.addPass(bloomPass);

const shockwavePass = new THREE.ShaderPass(ShockwaveShader);
composer.addPass(shockwavePass);

/* Animation */
let t = 0;

function animate() {
  t += 0.02;
  shockwavePass.uniforms.time.value = (t % 1.0);

  /* メイン粒子 */
  const mp = mainGeo.attributes.position.array;
  for (let i = 0; i < MAIN_COUNT; i++) {
    mp[i * 3 + 2] += 45;
    if (mp[i * 3 + 2] > 250) {
      mp[i * 3 + 0] = (Math.random() - 0.5) * 2200;
      mp[i * 3 + 1] = (Math.random() - 0.5) * 2200;
      mp[i * 3 + 2] = -4500;
    }
  }
  mainGeo.attributes.position.needsUpdate = true;

  /* Ambient 粒子 */
  const ap = ambGeo.attributes.position.array;
  for (let i = 0; i < AMBIENT_COUNT; i++) {
    ap[i * 3 + 0] += Math.sin(t + i) * 0.25;
    ap[i * 3 + 1] += Math.cos(t + i) * 0.25;
  }
  ambGeo.attributes.position.needsUpdate = true;

  composer.render();
  requestAnimationFrame(animate);
}

resizeRenderer();
animate();
</script>

</body>
</html>
